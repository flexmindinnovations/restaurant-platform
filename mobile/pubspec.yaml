name: restaurant_platform_mobile
description: Mobile workspace root
publish_to: 'none'

environment:
  sdk: ^3.9.0

workspace:
  - apps/customer_app
  - apps/delivery_app
  - apps/restaurant_app
  - packages/analytics_pkg
  - packages/authentication
  - packages/core
  - packages/design_system
  - packages/localization
  - packages/maps
  - packages/networking
  - packages/realtime
  - packages/storage

dev_dependencies:
  melos: ^7.8.0

melos:
  name: restaurant_platform_mobile

  scripts:
    analyze:
      run: dart run melos exec -- "dart analyze --fatal-infos"
      description: Run dart analyze in all packages

    test:
      run: dart run melos exec -- "flutter test"
      description: Run tests in all packages

    format:
      run: dart run melos exec -- "dart format --set-exit-if-changed ."
      description: Check formatting in all packages

    format-fix:
      run: dart run melos exec -- "dart format ."
      description: Fix formatting in all packages

    generate:
      run: dart run melos exec --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run code generation in all packages

    clean:
      run: dart run melos exec -- "flutter clean"
      description: Clean all packages
