name: Feature Request
description: Propose a new feature
labels: ["type:feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this be implemented?

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Identity
        - Users
        - Restaurants
        - Menus
        - Orders
        - Payments
        - Deliveries
        - Notifications
        - Reviews
        - Promotions
        - Analytics
        - AI
        - Infrastructure
        - Cross-cutting
    validations:
      required: true
