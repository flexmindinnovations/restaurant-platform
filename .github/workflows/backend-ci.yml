name: Backend CI

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit -m unit --cov=src --cov-report=xml

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: backend/coverage.xml

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:17-3.6
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform_dev
          POSTGRES_DB: restaurant_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: platform
          DB_PASSWORD: platform_dev
          DB_NAME: restaurant_platform

      - name: Run integration tests
        run: uv run pytest tests/integration -m integration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: platform
          DB_PASSWORD: platform_dev
          DB_NAME: restaurant_platform
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  test-architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check import boundaries
        run: uv run lint-imports

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-architecture]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: restaurant-platform-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile.worker
          push: false
          tags: restaurant-platform-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
