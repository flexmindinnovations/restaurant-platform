<div class="datatable-card">
  <div class="table-responsive">
    <table
      mat-table
      [dataSource]="tableDataSource()"
      matSort
      (matSortChange)="sortChange.emit($event)"
      class="full-width"
    >
      @for (col of columns(); track col.key) {
        <ng-container [matColumnDef]="col.key">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            [disabled]="!col.sortable"
            class="datatable-header-cell"
          >
            {{ col.label }}
          </th>
          <td mat-cell *matCellDef="let row" class="datatable-cell">
            @if (loading()) {
              <div class="skeleton-shimmer"></div>
            } @else {
              @if (getCellTemplate(col.key); as template) {
                <ng-container
                  *ngTemplateOutlet="template; context: { $implicit: row, row: row }"
                ></ng-container>
              } @else {
                {{ getValue(row, col.key) }}
              }
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="datatable-header-row"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [ngClass]="getRowClasses(row)"
        (click)="onRowClick(row, $event)"
      ></tr>
    </table>
  </div>

  @if (showPaginator()) {
    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="pageSizeOptions()"
      (page)="pageChange.emit($event)"
      [aria-label]="paginatorAriaLabel()"
      class="datatable-paginator"
    >
    </mat-paginator>
  }
</div>
