services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: rp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_dev
      POSTGRES_DB: restaurant_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d restaurant_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: redis:7-alpine
    container_name: rp-valkey
    ports:
      - "6380:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - valkey_data:/data
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:4.4
    container_name: rp-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,ses,secretsmanager
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack/init-scripts:/etc/localstack/init/ready.d
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health | grep '\\\"s3\\\": \\\"available\\\"'"]
      interval: 15s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: rp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_UI_AUTH_FILE: ""
    networks:
      - platform-network

volumes:
  postgres_data:
  valkey_data:
  localstack_data:

networks:
  platform-network:
    name: platform-network
    driver: bridge
