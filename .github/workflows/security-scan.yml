name: Security Scan

on:
  pull_request:
    branches: [develop, main, dev]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-python:
    name: Python SAST & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: uv tool install bandit

      - name: Run Bandit
        run: uv tool run bandit -r backend/src/ -c pyproject.toml --severity-level medium
        continue-on-error: true
        working-directory: backend

      - name: Run pip-audit
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          uvx pip-audit -r requirements.txt
        continue-on-error: true
        working-directory: backend

  sast-frontend:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run npm audit
        run: npm audit
        working-directory: frontend
        continue-on-error: true

  sast-mobile:
    name: Mobile Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Flutter Pub Outdated
        run: |
          cd mobile/apps/customer_app && flutter pub outdated
          cd ../restaurant_app && flutter pub outdated
          cd ../delivery_app && flutter pub outdated
        continue-on-error: true

  sast-semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config auto --fail-on-error
        continue-on-error: true

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t restaurant-platform-api:scan -f backend/Dockerfile backend/

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: restaurant-platform-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
