name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Check version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "ERROR: Version must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-rc.N"
            exit 1
          fi

      - name: Check tag does not exist
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${{ inputs.version }} already exists"
            exit 1
          fi

  ci-checks:
    name: Run CI checks
    needs: validate
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  build-backend:
    name: Build backend images
    needs: ci-checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        if: matrix.image == 'api'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/restaurant-platform-api:${{ inputs.version }}
            ${{ steps.ecr.outputs.registry }}/restaurant-platform-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        if: matrix.image == 'worker'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/restaurant-platform-worker:${{ inputs.version }}
            ${{ steps.ecr.outputs.registry }}/restaurant-platform-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend
    needs: ci-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            frontend-dist/**
